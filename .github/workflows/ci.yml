name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-test.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: models/
          key: fastembed-all-MiniLM-L6-v2-v1

      - name: Install dependencies
        run: pip install -r backend/requirements-test.txt

      - name: Download embedding model
        run: |
          python -c "
          from fastembed import TextEmbedding
          TextEmbedding('sentence-transformers/all-MiniLM-L6-v2', cache_dir='models')
          print('Model ready.')
          "

      - name: Run tests
        working-directory: backend
        # test_build_config.py validates PyInstaller build artifacts (model files,
        # spec content, .bat scripts) — not applicable in CI. Excluded intentionally.
        run: python -m pytest tests/ -v --ignore=tests/test_build_config.py
